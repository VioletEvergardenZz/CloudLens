name: cloudlens

services:
  cloudlens-backend:
    container_name: cloudlens-backend
    image: cloudlens-backend:local
    build:
      context: ./cloudlens-backend
    env_file:
      - .env
    volumes:
      - /opt/cloudlens/config:/etc/cloudlens
      - /opt/cloudlens/logs:/app/logs
      - /opt/cloudlens/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${CLOUDLENS_BACKEND_PORT:-8082}:8080"
    restart: unless-stopped
    networks:
      - cloudlens-net

  cloudlens-frontend:
    container_name: cloudlens-frontend
    image: cloudlens-frontend:local
    build:
      context: ./cloudlens-frontend
    depends_on:
      - cloudlens-backend
    ports:
      - "${CLOUDLENS_WEB_PORT:-8081}:80"
    restart: unless-stopped
    networks:
      - cloudlens-net

networks:
  cloudlens-net:
    driver: bridge
