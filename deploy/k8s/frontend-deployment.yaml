apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudlens-frontend
  namespace: cloudlens
  labels:
    app.kubernetes.io/name: cloudlens
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudlens
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudlens
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: cloudlens-frontend
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: cloudlens-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
