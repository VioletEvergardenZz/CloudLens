apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudlens-backend
  namespace: cloudlens
  labels:
    app.kubernetes.io/name: cloudlens
    app.kubernetes.io/component: backend
spec:
  # 当前后端使用本地 SQLite，先保持单副本，避免多个 Pod 同时写同一份数据库。
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudlens
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudlens
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: cloudlens-backend
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-runtime-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /runtime/config /runtime/data /runtime/logs
          volumeMounts:
            - name: backend-data
              mountPath: /runtime
      containers:
        - name: backend
          image: cloudlens-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: API_CORS_ORIGINS
              value: "*"
            - name: CONTROL_DATA_DIR
              value: /app/data/control
            - name: CLOUD_DATA_DIR
              value: /app/data/cloud
            - name: KB_DATA_DIR
              value: /app/data/kb
            - name: ALERT_SOURCE_MIRROR_ROOT
              value: /app/logs/alert-sources
            - name: ALIYUN_METRIC_PERIOD
              value: "60"
            - name: HUAWEI_METRIC_PERIOD
              value: "60"
            - name: AI_BASE_URL
              value: https://api.openai.com/v1
            - name: AI_MODEL
              value: gpt-4o-mini
            - name: AI_TIMEOUT
              value: 20s
          envFrom:
            - secretRef:
                name: cloudlens-cloud-credentials
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: backend-data
              mountPath: /etc/cloudlens
              subPath: config
            - name: backend-config
              mountPath: /etc/cloudlens/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: backend-data
              mountPath: /app/data
              subPath: data
            - name: backend-data
              mountPath: /app/logs
              subPath: logs
      volumes:
        - name: backend-config
          configMap:
            name: cloudlens-backend-config
        - name: backend-data
          persistentVolumeClaim:
            claimName: cloudlens-backend-data
