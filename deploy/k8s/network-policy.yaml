apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudlens-backend-ingress
  namespace: cloudlens
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudlens
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudlens
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudlens-frontend-ingress
  namespace: cloudlens
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudlens
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80

