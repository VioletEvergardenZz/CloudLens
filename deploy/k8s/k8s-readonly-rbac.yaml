apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudlens-k8s-readonly
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudlens-k8s-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudlens-k8s-readonly
subjects:
  - kind: ServiceAccount
    name: cloudlens-backend
    namespace: cloudlens
